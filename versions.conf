# shellcheck shell=bash
# ============================================================================
#  versions.conf  ——  版本与安装形式清单 (Version & Mode Manifest)
# ----------------------------------------------------------------------------
#  这是整个安装器的核心：所有“可选版本”都在这里声明。
#  想新增一个版本，只需在对应的数组里加一行，无需改动任何模块脚本。
#
#  This is the heart of the installer. Every selectable version is declared
#  here. To add a new version, just add one line to the matching array —
#  no module code needs to change.
#
#  字段说明 / Field format:  "版本号|安装形式(逗号分隔)|额外参数..."
#  Each entry:               "VERSION|MODES(comma separated)|extra meta..."
# ============================================================================

# ---------------------------------------------------------------------------
# Nginx / Tengine （同属 Web 服务器组件，二选一，互斥）
#   modes:  source = 源码编译 (compile)   |   pkg = 包管理器安装
#   meta :  flavor=nginx|tengine ; openssl/pcre/zlib 编译依赖版本 ;
#           modules=附加 configure 参数(多个用逗号分隔，仅 source 形式生效)
#   说明 :  源码编译会保留原仓库对源码的优化(IIS 伪装、autoindex 文件名长度等)。
#           Tengine 为 nginx 增强发行版；本条按需求开启 --with-http_upstream_check_module。
# ---------------------------------------------------------------------------
NGINX_VERSIONS=(
  "1.30.2|source,pkg|flavor=nginx;openssl=3.0.20;pcre=pcre2-10.42;zlib=1.3.1"
  "1.26.2|source,pkg|flavor=nginx;openssl=3.0.20;pcre=pcre2-10.42;zlib=1.3.1"
  "1.24.0|source,pkg|flavor=nginx;openssl=3.0.20;pcre=pcre2-10.42;zlib=1.3.1"
  "tengine-3.1.0|source|flavor=tengine;openssl=3.0.20;pcre=pcre2-10.42;zlib=1.3.1;modules=--with-http_upstream_check_module"
  "freenginx-1.30.1|source|flavor=freenginx;openssl=3.0.20;pcre=pcre2-10.42;zlib=1.3.1"
)
NGINX_DEFAULT="1.26.2"
NGINX_DEFAULT_MODE="source"

# ---------------------------------------------------------------------------
# Apache (httpd)
#   modes:  source = 源码编译   |   pkg = 包管理器安装
#   meta :  mpm=prefork/event ; http2=on/off ; apr / apr-util 版本
# ---------------------------------------------------------------------------
APACHE_VERSIONS=(
  "2.4.67|source,pkg|mpm=event;http2=on;apr=1.7.4;aprutil=1.6.3;openssl=3.0.20"
)
APACHE_DEFAULT="2.4.67"
APACHE_DEFAULT_MODE="source"

# ---------------------------------------------------------------------------
# PHP  (已取消 PHP 5 支持)
#   modes:  fpm    = php-fpm，配合 Nginx 使用
#           apache = mod_php，作为 Apache 模块运行
#   meta :  openssl 依赖版本 ; min_mem 最低内存(MB) ; ext 扩展系列(信息用)
#   说明 :  安装 PHP 时会自动编译常用的 phpredis 扩展。
# ---------------------------------------------------------------------------
PHP_VERSIONS=(
  "8.5.6|fpm,apache|openssl=3.0.20;min_mem=2000;ext=8;phpredis=6.3.0"
  "8.4.22|fpm,apache|openssl=3.0.20;min_mem=2000;ext=8;phpredis=6.3.0"
  "8.3.31|fpm,apache|openssl=3.0.20;min_mem=2000;ext=8;phpredis=6.3.0"
  "8.2.14|fpm,apache|openssl=3.0.20;min_mem=2000;ext=8;phpredis=6.3.0"
  "7.4.33|fpm,apache|openssl=3.0.20;min_mem=0;ext=7;phpredis=6.3.0"
)
PHP_DEFAULT="8.3.31"
PHP_DEFAULT_MODE="fpm"

# ImageMagick(imagick) 扩展版本（可选安装；适配所有 PHP 版本）
#   PHP 7.4–8.3 用 3.7.0（兼容 ImageMagick 6/7）
#   PHP 8.4/8.5 用 3.8.1（最新稳定版，支持 PHP 8.5 与 ImageMagick 7.1.2-x）
#   注：imagick 可链接系统 ImageMagick 7；但 IM 官方对 PHP 扩展仍推荐 IM6 以求最大兼容。
IMAGICK_VERSION="3.7.0"
IMAGICK_VERSION_PHP84="3.8.1"

# 可选：从源码编译 ImageMagick（而非用发行版包）。版本与安装前缀。
IMAGEMAGICK_VERSION="7.1.2-25"
PREFIX_IMAGEMAGICK="/usr/local/imagemagick"

# phpMyAdmin（可选安装到默认站点 ${WWWROOT}/web/phpMyAdmin）
#   仅保留 5.2.3（需 PHP 7.2+，覆盖本项目所有 PHP 版本）
PMA_VERSION="5.2.3"

# Adminer（可选；轻量级单文件数据库管理工具，phpMyAdmin 的轻量替代）
ADMINER_VERSION="5.4.2"

# Java(OpenJDK 11/17, Temurin) + Tomcat（可选）
PREFIX_JAVA="/usr/local/java"
PREFIX_TOMCAT="/usr/local/tomcat"
TOMCAT_VERSION="10.1.55"

# ---------------------------------------------------------------------------
# MySQL
#   modes:  source = 源码编译(cmake)   |   binary = 官方二进制包   |   pkg = 包管理器仓库
#   meta :  boost 是否需要 ; min_mem 最低内存(MB) ; glibc 二进制包 glibc 标记 ; ext 二进制包后缀
#   说明 :  MySQL 8.x 二进制包为 .tar.xz；8.x 源码编译需 C++17 工具链(EL7 默认 gcc 过旧)，
#           故 8.x 仅提供 binary / pkg 两种形式。
# ---------------------------------------------------------------------------
MYSQL_VERSIONS=(
  "9.7.0|binary,pkg|boost=off;min_mem=1000;glibc=glibc2.28;ext=tar.xz"
  "8.4.9|binary,pkg|boost=off;min_mem=1000;glibc=glibc2.17;ext=tar.xz"
  "8.0.46|binary,pkg|boost=off;min_mem=1000;glibc=glibc2.17;ext=tar.xz"
  "5.7.44|source,binary,pkg|boost=on;min_mem=2000;glibc=glibc2.12;ext=tar.gz"
)
MYSQL_DEFAULT="8.0.46"
MYSQL_DEFAULT_MODE="binary"

# ---------------------------------------------------------------------------
# MariaDB （与 MySQL 同为数据库，二选一，互斥）
#   modes:  binary = 官方二进制包(linux-systemd, .tar.gz)   |   pkg = 官方仓库/发行版包
#   meta :  min_mem 最低内存(MB)
#   说明 :  MariaDB 11.x 源码编译需较新工具链，这里提供 binary / pkg 两种形式。
#           二进制包目录形如 mariadb-<ver>-linux-systemd-x86_64。
# ---------------------------------------------------------------------------
MARIADB_VERSIONS=(
  "11.8.6|binary,pkg|min_mem=1000"
)
MARIADB_DEFAULT="11.8.6"
MARIADB_DEFAULT_MODE="binary"

# ---------------------------------------------------------------------------
# Redis （内存数据库 / 缓存）
#   modes:  source = 源码编译(安装到 /usr/local/redis)   |   pkg = 包管理器安装
#   meta :  min_mem 最低内存(MB)
#   说明 :  安装 PHP 时会自动编译 phpredis 扩展，无需在此单独选择。
# ---------------------------------------------------------------------------
REDIS_VERSIONS=(
  "8.8.0|source|min_mem=0"
  "7.4.9|source,pkg|min_mem=0"
  "6.2.22|source,pkg|min_mem=0"
)
REDIS_DEFAULT="7.4.9"
REDIS_DEFAULT_MODE="source"

# ---------------------------------------------------------------------------
# phpredis （PHP 的 Redis 扩展，需先安装 PHP）
#   mode:  source = 用已装 PHP 的 phpize 从源码编译
#   说明:  不再随 PHP 自动安装，改为单独选择/确认后安装。
#          PHP8 建议 6.3.0；PHP7.3 用 5.3.7。
# ---------------------------------------------------------------------------
PHPREDIS_VERSIONS=(
  "6.3.0|source|for=php8"
  "5.3.7|source|for=php7.3"
)
PHPREDIS_DEFAULT="6.3.0"
PHPREDIS_DEFAULT_MODE="source"

# ---------------------------------------------------------------------------
# 下载镜像 (Download mirrors) —— 主源失败自动回落到备用源
# ---------------------------------------------------------------------------
MIRROR_PRIMARY="https://www.zhangfangzhou.cn/third"
MIRROR_FALLBACK="http://arv.asuhu.com/ftp"

# 安装根目录 (install prefixes)
PREFIX_NGINX="/usr/local/nginx"
PREFIX_APACHE="/usr/local/apache"
PREFIX_PHP="/usr/local/php"
# 数据库存放在 /data（basedir=/data/mysql, datadir=/data/mysql/data；
# pid/log_error/slow_query_log 自动落到 datadir 下）。MySQL 与 MariaDB 互斥，
# 分别用 /data/mysql 与 /data/mariadb，互不干扰。
PREFIX_MYSQL="/data/mysql"
PREFIX_MARIADB="/data/mariadb"
PREFIX_REDIS="/usr/local/redis"
# php-fpm 监听方式：使用 Unix socket（比 127.0.0.1:9000 更安全、性能更好）
PHP_FPM_SOCK="/run/php/php-fpm.sock"
WWWROOT="/home/wwwroot"
WWWLOGS="/home/wwwlogs"
